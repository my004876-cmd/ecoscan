<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoScan - Modern AI Classifier</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #2D6A4F;
            --secondary: #52B788;
            --light: #D8F3DC;
            --dark: #081C15;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 12px 40px rgba(0,0,0,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Be Vietnam Pro', sans-serif; 
            background-color: #f4f7f5; 
            color: var(--dark);
            overflow-x: hidden;
        }

        /* LOGO & MENU 3 GẠCH */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 900; font-size: 1.5rem; 
            color: var(--primary); text-transform: uppercase;
        }
        .menu-icon {
            width: 30px; height: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer;
        }
        .menu-icon div { height: 3px; background: var(--primary); border-radius: 5px; transition: 0.3s; }

        /* SIDE MENU */
        #side-nav {
            position: fixed; top: 0; right: -100%; width: 80%; height: 100%;
            background: var(--primary); z-index: 1000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 60px 40px; box-shadow: -10px 0 30px rgba(0,0,0,0.2);
        }
        #side-nav.active { right: 0; }
        #side-nav a {
            display: block; color: var(--white); font-size: 1.5rem; font-weight: 700;
            text-decoration: none; margin-bottom: 30px; opacity: 0.8;
        }

        /* MAIN CONTENT */
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        /* CAMERA VIEWPORT */
        .viewport-wrapper {
            position: relative; width: 100%; aspect-ratio: 1/1;
            border-radius: 40px; overflow: hidden;
            box-shadow: var(--shadow); border: 8px solid var(--white);
            background: #000;
        }
        #webcam-container canvas { width: 100% !important; height: 100% !important; object-fit: cover; }
        
        .scan-overlay {
            position: absolute; inset: 0;
            border: 2px solid var(--secondary);
            animation: scanning 2s infinite linear;
            background: linear-gradient(to bottom, transparent, rgba(82, 183, 136, 0.2), transparent);
            pointer-events: none;
        }
        @keyframes scanning { 
            0% { transform: translateY(-100%); } 
            100% { transform: translateY(100%); } 
        }

        /* BUTTONS WITH EFFECTS */
        .btn {
            position: relative; overflow: hidden;
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            font-weight: 800; font-size: 1rem; cursor: pointer;
            transition: all 0.3s ease; margin-top: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 8px 20px rgba(45, 106, 79, 0.3); }
        .btn-primary:active { transform: scale(0.96); }

        /* RESULT CARD GLASS */
        .result-card {
            background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 30px; padding: 25px; margin-top: -50px;
            position: relative; z-index: 10; border: 1px solid rgba(255,255,255,0.3);
            box-shadow: var(--shadow); display: none;
        }
        .result-label { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .advice-box { 
            background: var(--light); padding: 15px; border-radius: 18px; 
            font-size: 0.9rem; margin-top: 15px; border-left: 5px solid var(--secondary);
        }

        /* STATS & HISTORY */
        .card { background: white; border-radius: 30px; padding: 25px; margin-top: 20px; box-shadow: var(--shadow); }
        .history-item { 
            display: flex; align-items: center; gap: 15px; padding: 15px 0;
            border-bottom: 1px dashed #eee;
        }
        .history-icon { width: 45px; height: 45px; background: var(--light); border-radius: 12px; display: flex; align-items: center; justify-content: center; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo">ECO<span>SCAN</span></div>
    <div class="menu-icon" onclick="toggleNav()">
        <div style="width: 100%;"></div>
        <div style="width: 70%; align-self: flex-end;"></div>
        <div style="width: 100%;"></div>
    </div>
</header>

<nav id="side-nav">
    <div style="font-size: 2rem; margin-bottom: 40px;" onclick="toggleNav()">✕</div>
    <a href="#" onclick="showPage('scan')">QUÉT RÁC</a>
    <a href="#" onclick="showPage('stats')">THỐNG KÊ</a>
    <a href="#" onclick="showPage('history')">NHẬT KÝ</a>
    <a href="#" onclick="showPage('ai')">TƯ VẤN AI</a>
</nav>

<div class="container">
    <div id="page-scan" class="page">
        <div class="viewport-wrapper">
            <div id="webcam-container"></div>
            <div class="scan-overlay"></div>
        </div>

        <button class="btn btn-primary" onclick="capture()">
            <span>✨</span> PHÂN LOẠI NGAY
        </button>

        <div id="result-card" class="result-card">
            <p style="text-transform: uppercase; font-size: 0.7rem; font-weight: 800; opacity: 0.5;">Đã nhận diện</p>
            <div class="result-label" id="res-name">Nhựa</div>
            <div class="advice-box" id="res-advice">Đang phân tích lời khuyên...</div>
        </div>
    </div>

    <div id="page-stats" class="page hidden">
        <div class="card">
            <h2 style="margin-bottom: 20px;">Xu hướng vứt rác</h2>
            <canvas id="statChart"></canvas>
        </div>
    </div>

    <div id="page-history" class="page hidden">
        <div class="card">
            <h2 style="margin-bottom: 20px;">Lịch sử hoạt động</h2>
            <div id="hist-content"></div>
        </div>
    </div>

    <div id="page-ai" class="page hidden">
        <div class="card" style="background: var(--primary); color: white;">
            <h2>🤖 Trợ lý Gemini AI</h2>
            <p id="ai-insight" style="margin-top: 15px; line-height: 1.6; opacity: 0.9;">
                Hãy bắt đầu quét rác để tôi có thể phân tích thói quen tiêu dùng của bạn và đưa ra lời khuyên cá nhân hóa.
            </p>
        </div>
    </div>
</div>

<script>
    const URL = "https://teachablemachine.withgoogle.com/models/dgtSA5qiE/";
    let model, webcam, chart;
    let stats = JSON.parse(localStorage.getItem('eco_v6_data') || '{"Giay":0,"Nhua":0,"Carton":0,"Huu_Co":0}');

    const LABELS = {
        "Giay": { n: "Giấy sạch", a: "Tái chế được. Tránh để dính dầu mỡ hoặc nước sốt." },
        "Nhua": { n: "Vật dụng Nhựa", a: "Súc sạch chai bằng nước trước khi vứt để tăng khả năng tái chế." },
        "Carton": { n: "Thùng Carton", a: "Gấp phẳng lại sẽ giúp các bác lao công thu gom dễ dàng hơn." },
        "Huu_Co": { n: "Rác Hữu Cơ", a: "Tuyệt vời để ủ phân bón. Đừng để lẫn mảnh nhựa vào nhé." }
    };

    // KHỞI TẠO AI
    async function init() {
        model = await tmImage.load(URL + "model.json", URL + "metadata.json");
        webcam = new tmImage.Webcam(500, 500, true);
        await webcam.setup();
        await webcam.play();
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        window.requestAnimationFrame(updateCam);
    }

    async function updateCam() {
        webcam.update();
        window.requestAnimationFrame(updateCam);
    }

    async function capture() {
        const prediction = await model.predict(webcam.canvas);
        let top = { p: 0, l: "" };
        prediction.forEach(p => { if(p.probability > top.p) top = { p: p.probability, l: p.className }; });

        if(top.l !== "Background" && top.p > 0.8) {
            showResult(top.l);
            updateStats(top.l);
        }
    }

    function showResult(label) {
        const res = LABELS[label];
        document.getElementById("result-card").style.display = "block";
        document.getElementById("res-name").innerText = res.n;
        document.getElementById("res-advice").innerText = "💡 " + res.a;
        
        // Tạo hiệu ứng rung nhẹ khi có kết quả
        navigator.vibrate?.(50);
    }

    function updateStats(l) {
        stats[l]++;
        localStorage.setItem('eco_v6_data', JSON.stringify(stats));
        
        // Thêm vào nhật ký
        const hist = JSON.parse(localStorage.getItem('eco_v6_hist') || '[]');
        hist.unshift({ n: LABELS[l].n, t: new Date().toLocaleTimeString() });
        localStorage.setItem('eco_v6_hist', JSON.stringify(hist.slice(0,15)));
    }

    // GIAO DIỆN
    function toggleNav() { document.getElementById("side-nav").classList.toggle("active"); }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.add('hidden'));
        document.getElementById('page-'+p).classList.remove('hidden');
        toggleNav();
        if(p === 'stats') renderChart();
        if(p === 'history') renderHistory();
        if(p === 'ai') renderAI();
    }

    function renderChart() {
        const ctx = document.getElementById('statChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Giấy', 'Nhựa', 'Carton', 'Hữu cơ'],
                datasets: [{
                    label: 'Số lần quét',
                    data: [stats.Giay, stats.Nhua, stats.Carton, stats.Huu_Co],
                    backgroundColor: '#52B788', borderRadius: 10
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }

    function renderHistory() {
        const hist = JSON.parse(localStorage.getItem('eco_v6_hist') || '[]');
        document.getElementById('hist-content').innerHTML = hist.map(h => `
            <div class="history-item">
                <div class="history-icon">♻️</div>
                <div>
                    <p style="font-weight:700">${h.n}</p>
                    <p style="font-size:0.8rem; opacity:0.6">${h.t}</p>
                </div>
            </div>
        `).join('');
    }

    function renderAI() {
        const total = Object.values(stats).reduce((a,b)=>a+b, 0);
        let msg = "Bạn chưa quét đủ dữ liệu để tôi phân tích.";
        if(total > 5) {
            const max = Object.keys(stats).reduce((a, b) => stats[a] > stats[b] ? a : b);
            msg = `Dựa trên 10 lần quét gần đây, bạn vứt nhiều <b>${LABELS[max].n}</b> nhất. Tôi khuyên bạn nên sử dụng các vật dụng thay thế bền vững hơn để bảo vệ môi trường!`;
        }
        document.getElementById('ai-insight').innerHTML = msg;
    }

    init();
</script>
</body>
</html>
