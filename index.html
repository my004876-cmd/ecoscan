<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EcoScan – Phân Loại Rác Thông Minh</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ml5@1/dist/ml5.min.js"></script>

<style>
  :root {
    --g1: #97A970; --g2: #B5C99A; --g3: #87986A;
    --g4: #CFE1B9; --g5: #718355; --g6: #E9F5DB;
    --b1: #B08968; --b2: #DDB892; --b3: #906644;
    --bg: #F5F0E8; --card: #FFFDF7; --text: #3B3228;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }

  /* ── NAVIGATION BAR ── */
  #navbar {
    background: linear-gradient(90deg, var(--g5), var(--b3));
    padding: 15px; position: sticky; top: 0; z-index: 1000;
    display: flex; justify-content: space-between; align-items: center; color: white;
  }
  .nav-links { display: flex; gap: 10px; }
  .nav-item { 
    padding: 8px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; 
    cursor: pointer; text-decoration: none; color: rgba(255,255,255,0.8);
  }
  .nav-item.active { background: white; color: var(--g5); }

  #main { max-width: 600px; margin: 0 auto; padding: 15px; }
  .page { display: none; }
  .page.active { display: block; animation: slideUp 0.3s ease-out; }
  @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

  .card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
  
  /* ── TRANG PHÂN LOẠI ── */
  #media-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 20px; overflow: hidden; position: relative; }
  #video, #preview { width: 100%; height: 100%; object-fit: cover; }
  .btn-main { width: 100%; padding: 15px; border-radius: 30px; border: none; font-weight: 700; font-size: 16px; margin-top: 10px; cursor: pointer; transition: 0.2s; }
  .btn-scan { background: var(--g5); color: white; }
  .btn-upload { background: var(--g4); color: var(--g5); }

  #instruction-card { text-align: center; display: none; }
  .bin-icon { font-size: 60px; margin-bottom: 10px; }
  .tip-box { background: var(--g6); padding: 15px; border-radius: 15px; margin-top: 15px; font-size: 14px; text-align: left; border-left: 5px solid var(--g5); }

  /* ── TRANG BIỂU ĐỒ ── */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--b1); }
  .chart-container { height: 300px; width: 100%; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header id="navbar">
  <div style="font-weight: 800;">♻️ EcoScan</div>
  <nav class="nav-links">
    <div class="nav-item active" onclick="showPage('scan-page', this)">📸 Quét rác</div>
    <div class="nav-item" onclick="showPage('chart-page', this)">📊 Thống kê</div>
    <div class="nav-item" onclick="showPage('history-page', this)">📋 Nhật ký</div>
  </nav>
</header>

<main id="main">
  <div id="scan-page" class="page active">
    <div id="media-box">
      <video id="video" autoplay playsinline></video>
      <img id="preview" class="hidden">
      <canvas id="canvas" class="hidden"></canvas>
    </div>

    <button id="btn-capture" class="btn-main btn-scan" onclick="captureAndClassify()">🎯 CHỤP & PHÂN LOẠI</button>
    <button id="btn-retake" class="btn-main btn-upload hidden" onclick="resetCamera()">🔄 QUAY LẠI CAMERA</button>
    <button class="btn-main btn-upload" onclick="document.getElementById('file-input').click()">📁 TẢI ẢNH LÊN</button>
    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleUpload(event)">

    <div id="instruction-card" class="card">
      <div id="result-header" style="font-size: 20px; font-weight: 800;"></div>
      <div class="bin-icon" id="bin-emoji">🗑️</div>
      <div id="bin-text" style="font-weight: 700; font-size: 18px; margin-bottom: 10px;"></div>
      <div id="tip-content" class="tip-box"></div>
    </div>
  </div>

  <div id="chart-page" class="page">
    <div id="no-data" class="empty-state">
      <div style="font-size: 50px;">📉</div>
      <p>Chưa có dữ liệu phân loại.</p>
      <p style="font-size: 13px;">Hãy chụp ảnh rác để bắt đầu vẽ biểu đồ!</p>
    </div>
    
    <div id="has-data" class="hidden">
      <div class="card">
        <div style="font-weight: 700; margin-bottom: 15px;">Tỷ lệ các loại rác</div>
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
      </div>
    </div>
  </div>

  <div id="history-page" class="page">
    <div class="card">
      <div style="font-weight: 700; margin-bottom: 10px;">10 lần quét gần nhất</div>
      <div id="history-list" style="font-size: 14px;"></div>
    </div>
  </div>
</main>

<script>
  const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/dgtSA5qiE/';
  let classifier, video, pieChart;
  let wasteData = { 'Carton': 0, 'Giấy': 0, 'Nhựa': 0, 'Hữu Cơ': 0 };

  // Khởi tạo
  async function init() {
    video = document.getElementById('video');
    classifier = await ml5.imageClassifier(MODEL_URL + 'model.json');
    startCamera();
    loadLocalData();
  }

  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(s => video.srcObject = s);
  }

  function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
    if(id === 'chart-page') renderCharts();
  }

  // Phân loại
  function captureAndClassify() {
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    
    const img = document.getElementById('preview');
    img.src = canvas.toDataURL('image/png');
    img.classList.remove('hidden');
    video.classList.add('hidden');
    
    document.getElementById('btn-capture').classList.add('hidden');
    document.getElementById('btn-retake').classList.remove('hidden');

    classifier.classify(img, (results) => {
      processResult(results[0]);
    });
  }

  function processResult(res) {
    const label = res.label;
    if (label.includes('Background')) return;

    const card = document.getElementById('instruction-card');
    const header = document.getElementById('result-header');
    const emoji = document.getElementById('bin-emoji');
    const txt = document.getElementById('bin-text');
    const tip = document.getElementById('tip-content');

    card.style.display = 'block';
    header.innerText = `Nhận diện: ${label}`;

    // Logic chỉ dẫn & lời khuyên
    if (label.includes('Hữu')) {
      emoji.innerText = "🍎";
      txt.innerText = "BỎ VÀO THÙNG ĐỎ";
      txt.style.color = "#906644";
      tip.innerHTML = "<b>Lời khuyên:</b> Rác hữu cơ có thể làm phân bón. Đừng để lẫn túi nilon vào đây bạn nhé!";
      wasteData['Hữu Cơ']++;
    } else {
      emoji.innerText = "♻️";
      txt.innerText = "BỎ VÀO THÙNG XANH";
      txt.style.color = "#718355";
      tip.innerHTML = `<b>Lời khuyên:</b> Đây là rác tái chế (${label}). Hãy đảm bảo vật thể khô và sạch trước khi vứt.`;
      if(label.includes('Carton')) wasteData['Carton']++;
      else if(label.includes('Giấy')) wasteData['Giấy']++;
      else wasteData['Nhựa']++;
    }

    saveHistory(label, res.confidence);
    localStorage.setItem('waste_stats', JSON.stringify(wasteData));
  }

  function resetCamera() {
    document.getElementById('preview').classList.add('hidden');
    video.classList.remove('hidden');
    document.getElementById('btn-capture').classList.remove('hidden');
    document.getElementById('btn-retake').classList.add('hidden');
    document.getElementById('instruction-card').style.display = 'none';
  }

  function handleUpload(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = document.getElementById('preview');
      img.src = ev.target.result;
      img.classList.remove('hidden');
      video.classList.add('hidden');
      classifier.classify(img, (results) => processResult(results[0]));
    };
    reader.readAsDataURL(e.target.files[0]);
  }

  // Thống kê & Lịch sử
  function renderCharts() {
    const total = Object.values(wasteData).reduce((a, b) => a + b, 0);
    if (total === 0) {
      document.getElementById('no-data').classList.remove('hidden');
      document.getElementById('has-data').classList.add('hidden');
      return;
    }
    document.getElementById('no-data').classList.add('hidden');
    document.getElementById('has-data').classList.remove('hidden');

    const ctx = document.getElementById('pieChart').getContext('2d');
    if (pieChart) pieChart.destroy();
    pieChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: Object.keys(wasteData),
        datasets: [{
          data: Object.values(wasteData),
          backgroundColor: ['#97A970', '#B5C99A', '#718355', '#DDB892']
        }]
      }
    });
  }

  function saveHistory(label, conf) {
    const hist = JSON.parse(localStorage.getItem('waste_hist') || '[]');
    hist.unshift({ label, conf, time: new Date().toLocaleTimeString() });
    localStorage.setItem('waste_hist', JSON.stringify(hist.slice(0, 10)));
    renderHistory();
  }

  function renderHistory() {
    const hist = JSON.parse(localStorage.getItem('waste_hist') || '[]');
    document.getElementById('history-list').innerHTML = hist.map(h => 
      `<div style="padding:10px 0; border-bottom:1px solid #eee">
        <b>${h.time}</b>: ${h.label} (${(h.conf*100).toFixed(0)}%)
      </div>`
    ).join('');
  }

  function loadLocalData() {
    const saved = localStorage.getItem('waste_stats');
    if(saved) wasteData = JSON.parse(saved);
    renderHistory();
  }

  init();
</script>
</body>
</html>
