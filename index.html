<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoScan Pro - AI Integrated</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --g1: #718355; --g2: #97A970; --g3: #CFE1B9;
            --b1: #906644; --bg: #F8F9F6; --white: #ffffff;
            --text: #3B3228; --shadow: 0 10px 30px rgba(113, 131, 85, 0.1);
            --radius: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Lexend', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        header {
            background: var(--white); padding: 10px 5%;
            display: flex; flex-direction: column; align-items: center;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.03); gap: 10px;
        }
        
        .header-top { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--g1); display: flex; align-items: center; gap: 5px; }
        .logo span { color: var(--b1); }

        nav { display: flex; gap: 10px; width: 100%; justify-content: center; overflow-x: auto; padding-bottom: 5px; }
        .nav-btn { 
            white-space: nowrap; padding: 8px 15px; font-size: 0.85rem; font-weight: 600;
            color: var(--text); opacity: 0.5; cursor: pointer; transition: 0.3s; border-bottom: 2px solid transparent;
        }
        .nav-btn.active { opacity: 1; color: var(--g1); border-bottom-color: var(--g1); }

        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .dashboard-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .card { 
            background: var(--white); border-radius: var(--radius); padding: 20px; 
            box-shadow: var(--shadow); border: 1px solid rgba(151, 169, 112, 0.2); margin-bottom: 20px;
        }
        
        .viewport-wrapper {
            position: relative; width: 100%; aspect-ratio: 1/1;
            border-radius: 18px; overflow: hidden; background: #000;
        }
        #webcam-container canvas, #image-preview { width: 100% !important; height: 100% !important; object-fit: cover; }
        #image-preview { display: none; }
        
        .scan-line {
            position: absolute; width: 100%; height: 3px;
            background: var(--g3); animation: scanMove 3s infinite ease-in-out; z-index: 5;
        }
        @keyframes scanMove { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        .result-display { text-align: center; padding: 25px; border-radius: 20px; background: var(--g3); color: var(--g1); }
        .result-display.organic { background: #EDE0D4; color: var(--b1); }
        .res-label { font-size: 1.6rem; font-weight: 700; margin: 10px 0; }
        
        .btn-main {
            width: 100%; padding: 16px; border: none; border-radius: 18px;
            background: var(--g1); color: white; font-weight: 600; font-size: 1rem;
            cursor: pointer; margin-top: 10px; box-shadow: 0 4px 12px rgba(113, 131, 85, 0.2);
        }
        .btn-sub {
            width: 100%; padding: 12px; border: 2px solid var(--g1); border-radius: 18px;
            background: transparent; color: var(--g1); font-weight: 600; font-size: 0.9rem;
            cursor: pointer; margin-top: 10px;
        }

        .hist-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; }

        .ai-chat-box { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; text-align: center; }
        .btn-ai-ask {
            background: linear-gradient(135deg, var(--g1), var(--g2)); color: white;
            border: none; padding: 15px 25px; border-radius: 50px; font-weight: 700;
            cursor: pointer; font-size: 0.9rem; box-shadow: 0 5px 15px rgba(113, 131, 85, 0.3);
            transition: 0.3s; width: 100%;
        }
        .btn-ai-ask:active { transform: scale(0.98); }
        .ai-response { 
            margin-top: 15px; font-size: 0.9rem; line-height: 1.6; min-height: 50px;
            color: var(--text); background: var(--bg); padding: 15px; border-radius: 15px; text-align: left;
            border-left: 4px solid var(--g1);
        }

        .hidden { display: none !important; }
        @media (max-width: 850px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="logo">♻️ Eco<span>Scan</span></div>
        <div id="current-date" style="font-size: 0.7rem; font-weight: 600; color: var(--g1);"></div>
    </div>
    <nav id="top-nav">
        <div class="nav-btn active" onclick="showPage('scan', this)">Phân Loại</div>
        <div class="nav-btn" onclick="showPage('stats', this)">Thống Kê</div>
        <div class="nav-btn" onclick="showPage('history', this)">Nhật Ký</div>
        <div class="nav-btn" onclick="showPage('report', this)">Báo Cáo AI</div>
    </nav>
</header>

<div class="container">
    <div id="page-scan" class="page-content">
        <div class="dashboard-grid">
            <div class="card">
                <div class="viewport-wrapper">
                    <div id="webcam-container"></div>
                    <img id="image-preview" src="" alt="Preview">
                    <div class="scan-line"></div>
                </div>
                <button class="btn-main" onclick="capture()">🎯 NHẬN DIỆN CAMERA</button>
                <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
                <button class="btn-sub" onclick="document.getElementById('file-input').click()">📤 TẢI ẢNH LÊN</button>
            </div>

            <div class="result-panel">
                <div class="card result-display" id="res-box">
                    <div class="res-label" id="res-name">Sẵn sàng</div>
                    <div id="res-advice" style="font-size: 0.8rem;">Quét camera hoặc tải ảnh rác thải để bắt đầu.</div>
                </div>
                <div class="card">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div style="background: var(--bg); padding: 10px; border-radius: 12px; text-align: center;">
                            <div id="count-total" style="font-size: 1.2rem; font-weight: 700;">0</div>
                            <div style="font-size: 0.6rem; opacity: 0.6;">TỔNG QUÉT</div>
                        </div>
                        <div style="background: var(--bg); padding: 10px; border-radius: 12px; text-align: center;">
                            <div id="top-type" style="font-size: 0.8rem; font-weight: 700; padding-top: 5px;">-</div>
                            <div style="font-size: 0.6rem; opacity: 0.6;">NHIỀU NHẤT</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="page-stats" class="page-content hidden">
        <div class="card">
            <h3 style="color: var(--g1); margin-bottom: 15px;">📊 Thống Kê Rác Thải</h3>
            <div style="height: 300px;"><canvas id="mainChart"></canvas></div>
        </div>
    </div>

    <div id="page-history" class="page-content hidden">
        <div class="card">
            <h3 style="color: var(--g1); margin-bottom: 15px;">📜 Nhật Ký Gần Đây</h3>
            <div id="history-container"></div>
        </div>
    </div>

    <div id="page-report" class="page-content hidden">
        <div class="card">
            <h3 style="color: var(--g1);">🤖 Phân tích xu hướng</h3>
            <div id="gemini-insight" style="font-size: 0.9rem; line-height: 1.6; margin-top: 15px; padding: 15px; background: var(--g3); color: var(--g1); border-radius: 15px;">
                Dựa trên dữ liệu bạn đã quét, tôi sẽ đưa ra nhận xét về thói quen tiêu dùng.
            </div>

            <div class="ai-chat-box">
                <button class="btn-ai-ask" onclick="simulatedAI()">🔍 DỰA TRÊN BIỂU ĐỒ, HÃY ĐƯA RA NHẬN XÉT VÀ LỜI KHUYÊN</button>
                <div id="ai-chat-res" class="ai-response" style="display: none;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/dgtSA5qiE/";
    let model, webcam, chart;
    let stats = JSON.parse(localStorage.getItem('eco_v8_stats') || '{"Giay":0,"Nhua":0,"Carton":0,"Huu_Co":0}');
    let isUsingCamera = true;

    async function init() {
        const d = new Date();
        document.getElementById('current-date').innerText = d.toLocaleDateString('vi-VN', {day:'numeric', month:'long'});
        try {
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
            webcam = new tmImage.Webcam(500, 500, false); 
            await webcam.setup({ facingMode: "environment" }); 
            await webcam.play();
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            window.requestAnimationFrame(loop);
            updateDashboardStats();
        } catch(e) { console.error("Camera error:", e); }
    }

    async function loop() {
        if(isUsingCamera) webcam.update();
        window.requestAnimationFrame(loop);
    }

    function showPage(pageId, btnEl) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.remove('hidden');
        if(btnEl) btnEl.classList.add('active');
        if(pageId === 'stats') renderChart();
        if(pageId === 'history') renderHistory();
    }

    async function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async function(f) {
            isUsingCamera = false;
            const img = document.getElementById('image-preview');
            img.src = f.target.result;
            img.style.display = "block";
            document.getElementById('webcam-container').style.display = "none";
            // Wait for image to load to predict
            img.onload = async () => {
                const prediction = await model.predict(img);
                processPrediction(prediction);
            };
        };
        reader.readAsDataURL(file);
    }

    async function capture() {
        isUsingCamera = true;
        document.getElementById('image-preview').style.display = "none";
        document.getElementById('webcam-container').style.display = "block";
        if(!model) return;
        const prediction = await model.predict(webcam.canvas);
        processPrediction(prediction);
    }

    function processPrediction(prediction) {
        let top = { p: 0, l: "" };
        prediction.forEach(p => { if(p.probability > top.p) top = { p: p.probability, l: p.className }; });

        const MAP = {
            "Giay": { n: "Giấy sạch", a: "Bỏ vào thùng xanh dành cho giấy tái chế.", c: "recycle" },
            "Nhua": { n: "Nhựa", a: "Rửa sạch, làm khô trước khi vứt vào thùng tái chế.", c: "recycle" },
            "Carton": { n: "Bìa Carton", a: "Gấp phẳng để tiết kiệm diện tích thu gom.", c: "recycle" },
            "Huu_Co": { n: "Hữu Cơ", a: "Có thể ủ làm phân bón tại nhà rất tốt.", c: "organic" }
        };

        if(top.l !== "Background" && top.p > 0.85) {
            const data = MAP[top.l];
            document.getElementById("res-name").innerText = data.n;
            document.getElementById("res-advice").innerText = data.a;
            document.getElementById("res-box").className = "card result-display " + (data.c === 'organic' ? 'organic' : '');
            stats[top.l]++;
            localStorage.setItem('eco_v8_stats', JSON.stringify(stats));
            let hist = JSON.parse(localStorage.getItem('eco_v8_hist') || '[]');
            hist.unshift({ n: data.n, t: new Date().toLocaleTimeString('vi-VN') });
            localStorage.setItem('eco_v8_hist', JSON.stringify(hist.slice(0, 10)));
            updateDashboardStats();
        } else {
            document.getElementById("res-name").innerText = "Chưa rõ";
            document.getElementById("res-advice").innerText = "Vui lòng đưa vật thể lại gần hoặc chụp rõ hơn.";
        }
    }

    function updateDashboardStats() {
        const total = Object.values(stats).reduce((a,b)=>a+b, 0);
        document.getElementById('count-total').innerText = total;
        if(total > 0) {
            const maxKey = Object.keys(stats).reduce((a, b) => stats[a] > stats[b] ? a : b);
            const MAP_NAMES = {"Giay":"Giấy", "Nhua":"Nhựa", "Carton":"Carton", "Huu_Co":"Hữu Cơ"};
            document.getElementById('top-type').innerText = MAP_NAMES[maxKey];
        }
    }

    function renderHistory() {
        const hist = JSON.parse(localStorage.getItem('eco_v8_hist') || '[]');
        const container = document.getElementById('history-container');
        if(!container) return;
        container.innerHTML = hist.length === 0 ? "<p>Chưa có dữ liệu.</p>" : hist.map(h => `<div class="hist-item"><b>${h.n}</b><span>${h.t}</span></div>`).join('');
    }

    function renderChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Giấy', 'Nhựa', 'Carton', 'Hữu cơ'],
                datasets: [{
                    data: [stats.Giay, stats.Nhua, stats.Carton, stats.Huu_Co],
                    backgroundColor: ['#97A970', '#718355', '#B08968', '#DDB892'],
                    borderWidth: 0
                }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    // SIMULATED AI LOGIC WITH TYPING EFFECT
    function typeWriter(text, elementId) {
        let i = 0;
        const speed = 30; 
        const el = document.getElementById(elementId);
        el.innerHTML = "🤖 ";
        el.style.display = "block";
        
        function type() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, speed);
            }
        }
        type();
    }

    function simulatedAI() {
        const total = Object.values(stats).reduce((a,b)=>a+b, 0);
        if(total === 0) {
            typeWriter("Bạn chưa thực hiện quét rác thải nào. Hãy quét ít nhất một món đồ để AI có thể phân tích thói quen của bạn nhé!", "ai-chat-res");
            return;
        }

        const maxKey = Object.keys(stats).reduce((a, b) => stats[a] > stats[b] ? a : b);
        let response = "";

        const responses = {
            "Giay": "Số liệu cho thấy bạn đang sử dụng một lượng giấy khá lớn trong sinh hoạt. Để tối ưu việc bảo vệ tài nguyên rừng, bạn nên phân loại riêng giấy sạch và giấy đã dính dầu mỡ. Với giấy sạch, hãy gom gọn và gửi đến các điểm thu mua phế liệu để tái chế thành giấy mới. Ngoài ra, hãy thử tận dụng các trang giấy còn trống làm sổ ghi chú hoặc chuyển sang sử dụng các ứng dụng ghi chú kỹ thuật số trên điện thoại để giảm thiểu rác thải nguồn này nhé!",
            "Nhua": "Nhựa đang chiếm tỉ trọng cao trong biểu đồ rác thải của bạn. Nhựa mất hàng trăm năm để phân hủy, vì vậy việc bạn đang phân loại chúng là một hành động cực kỳ ý nghĩa. Lời khuyên cho bạn: Hãy thực hiện quy tắc 'Rửa sạch - Làm khô - Ép bẹp' trước khi bỏ vào thùng tái chế. Việc này giúp ngăn mùi hôi và tăng hiệu suất thu gom. Để thay đổi thói quen lâu dài, hãy thử thay thế túi nilon bằng túi vải và ưu tiên các sản phẩm có bao bì thân thiện hơn nhé!",
            "Carton": "Bạn đang có một lượng rác thải Carton đáng kể, thường đến từ việc mua sắm và vận chuyển hàng hóa. Carton là vật liệu tái chế rất giá trị. Bạn hãy dành chút thời gian tháo dỡ các khớp nối và gấp phẳng các thùng giấy lại để tiết kiệm không gian lưu trữ. Đặc biệt, các tấm bìa này có thể biến thành vật liệu lót sàn khi sửa chữa nhà cửa hoặc làm đồ chơi handmade rất sáng tạo. Hãy tiếp tục phân loại tốt như hiện tại nhé!",
            "Huu_Co": "Rác hữu cơ chiếm phần lớn trong số liệu của bạn, đây là dấu hiệu của một lối sống tự nấu nướng tại gia rất lành mạnh. Để xử lý hiệu quả, bạn có thể áp dụng phương pháp ủ phân hữu cơ (compost) ngay tại ban công hoặc sân vườn. Lượng phân bón này cực kỳ tốt cho cây cảnh và rau sạch, giúp tạo thành một vòng tuần hoàn xanh ngay trong chính ngôi nhà của bạn. Nhớ tách biệt rác hữu cơ với rác vô cơ để tránh gây ô nhiễm chéo cho các loại rác tái chế khác!"
        };

        response = responses[maxKey] || "Dữ liệu cân bằng. Bạn đang kiểm soát rác thải khá tốt, hãy tiếp tục duy trì việc phân loại này nhé!";
        typeWriter(response, "ai-chat-res");
    }

    init();
</script>
</body>
</html>
