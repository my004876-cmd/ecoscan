<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoScan Pro - AI Integrated</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --g1: #718355; --g2: #97A970; --g3: #CFE1B9;
            --b1: #906644; --bg: #F8F9F6; --white: #ffffff;
            --text: #3B3228; --shadow: 0 10px 30px rgba(113, 131, 85, 0.1);
            --radius: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Lexend', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        header {
            background: var(--white);
            padding: 10px 5%;
            display: flex; flex-direction: column; align-items: center;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
            gap: 10px;
        }
        
        .header-top { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--g1); display: flex; align-items: center; gap: 5px; }
        .logo span { color: var(--b1); }

        nav { 
            display: flex; gap: 10px; width: 100%; 
            justify-content: center; overflow-x: auto; 
            padding-bottom: 5px; -webkit-overflow-scrolling: touch;
        }
        .nav-btn { 
            white-space: nowrap; padding: 8px 15px;
            font-size: 0.85rem; font-weight: 600;
            color: var(--text); opacity: 0.5;
            cursor: pointer; transition: 0.3s;
            border-bottom: 2px solid transparent;
        }
        .nav-btn.active { opacity: 1; color: var(--g1); border-bottom-color: var(--g1); }

        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }

        .dashboard-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .card { 
            background: var(--white); border-radius: var(--radius); padding: 20px; 
            box-shadow: var(--shadow); border: 1px solid rgba(151, 169, 112, 0.2);
            margin-bottom: 20px;
        }
        
        .viewport-wrapper {
            position: relative; width: 100%; aspect-ratio: 1/1;
            border-radius: 18px; overflow: hidden; background: #000;
        }
        #webcam-container canvas { width: 100% !important; height: 100% !important; object-fit: cover; }
        
        .scan-line {
            position: absolute; width: 100%; height: 3px;
            background: var(--g3); animation: scanMove 3s infinite ease-in-out; z-index: 5;
        }
        @keyframes scanMove { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        .result-display {
            text-align: center; padding: 25px; border-radius: 20px;
            background: var(--g3); color: var(--g1);
        }
        .result-display.organic { background: #EDE0D4; color: var(--b1); }
        .res-label { font-size: 1.6rem; font-weight: 700; margin: 10px 0; }
        
        .btn-main {
            width: 100%; padding: 16px; border: none; border-radius: 18px;
            background: var(--g1); color: white; font-weight: 600; font-size: 1rem;
            cursor: pointer; margin-top: 10px; box-shadow: 0 4px 12px rgba(113, 131, 85, 0.2);
        }

        .hist-item {
            display: flex; justify-content: space-between; padding: 12px 0;
            border-bottom: 1px solid #f0f0f0; font-size: 0.85rem;
        }

        /* AI Chat Styling */
        .ai-chat-box { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .ai-input-group { display: flex; gap: 8px; margin-top: 10px; }
        .ai-input-group input { 
            flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--g3);
            font-size: 0.85rem; outline: none;
        }
        .ai-response { 
            margin-top: 15px; font-size: 0.85rem; line-height: 1.5; 
            color: var(--b1); background: var(--bg); padding: 12px; border-radius: 12px;
        }

        .hidden { display: none !important; }

        @media (max-width: 850px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="logo">♻️ Eco<span>Scan</span></div>
        <div id="current-date" style="font-size: 0.7rem; font-weight: 600; color: var(--g1);"></div>
    </div>
    <nav id="top-nav">
        <div class="nav-btn active" onclick="showPage('scan', this)">Phân Loại</div>
        <div class="nav-btn" onclick="showPage('stats', this)">Thống Kê</div>
        <div class="nav-btn" onclick="showPage('history', this)">Nhật Ký</div>
        <div class="nav-btn" onclick="showPage('report', this)">Báo Cáo AI</div>
    </nav>
</header>

<div class="container">
    <div id="page-scan" class="page-content">
        <div class="dashboard-grid">
            <div class="card">
                <div class="viewport-wrapper">
                    <div id="webcam-container"></div>
                    <div class="scan-line"></div>
                </div>
                <button class="btn-main" onclick="capture()">🎯 NHẬN DIỆN NGAY</button>
            </div>

            <div class="result-panel">
                <div class="card result-display" id="res-box">
                    <div class="res-label" id="res-name">Sẵn sàng</div>
                    <div id="res-advice" style="font-size: 0.8rem;">Đưa rác vào khung hình và nhấn nút phân loại.</div>
                </div>
                <div class="card">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div style="background: var(--bg); padding: 10px; border-radius: 12px; text-align: center;">
                            <div id="count-total" style="font-size: 1.2rem; font-weight: 700;">0</div>
                            <div style="font-size: 0.6rem; opacity: 0.6;">TỔNG QUÉT</div>
                        </div>
                        <div style="background: var(--bg); padding: 10px; border-radius: 12px; text-align: center;">
                            <div id="top-type" style="font-size: 0.8rem; font-weight: 700; padding-top: 5px;">-</div>
                            <div style="font-size: 0.6rem; opacity: 0.6;">NHIỀU NHẤT</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="page-stats" class="page-content hidden">
        <div class="card">
            <h3 style="color: var(--g1); margin-bottom: 15px;">📊 Thống Kê Rác Thải</h3>
            <div style="height: 300px;"><canvas id="mainChart"></canvas></div>
        </div>
    </div>

    <div id="page-history" class="page-content hidden">
        <div class="card">
            <h3 style="color: var(--g1); margin-bottom: 15px;">📜 Nhật Ký Gần Đây</h3>
            <div id="history-container"></div>
        </div>
    </div>

    <div id="page-report" class="page-content hidden">
        <div class="card">
            <h3 style="color: var(--g1);">🤖 Trợ lý Gemini AI</h3>
            <div id="gemini-insight" style="font-size: 0.9rem; line-height: 1.6; margin-top: 15px; padding: 15px; background: var(--g3); color: var(--g1); border-radius: 15px;">
                Đang chờ dữ liệu để phân tích...
            </div>

            <div class="ai-chat-box">
                <p style="font-weight: 700; font-size: 0.85rem;">💬 Hỏi đáp trực tiếp:</p>
                <div class="ai-input-group">
                    <input type="text" id="ai-input" placeholder="Ví dụ: Pin cũ thì vứt ở đâu?">
                    <button onclick="askGemini()" style="padding: 10px 18px; background: var(--g1); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600;">Hỏi</button>
                </div>
                <div id="ai-chat-res" class="ai-response" style="display: none;"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // Import SDK Gemini chính thức
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/dgtSA5qiE/";
    const part1 = "AIzaSyDCCmHpX3cB5hU";
    const part2 = "Z7IlnTQIRHDPjKhcI6ps"; // Thay bằng phần còn lại của mã mới
    const API_KEY = part1 + part2;
    
    // Khởi tạo Gemini AI
    const genAI = new GoogleGenerativeAI(API_KEY);
    const aiModel = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    let model, webcam, chart;
    let stats = JSON.parse(localStorage.getItem('eco_v8_stats') || '{"Giay":0,"Nhua":0,"Carton":0,"Huu_Co":0}');

    // Xuất các hàm ra phạm vi window để các nút bấm HTML có thể gọi được
    window.showPage = showPage;
    window.capture = capture;
    window.askGemini = askGemini;

    async function init() {
        const d = new Date();
        const dateEl = document.getElementById('current-date');
        if(dateEl) dateEl.innerText = d.toLocaleDateString('vi-VN', {day:'numeric', month:'long'});

        try {
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
            webcam = new tmImage.Webcam(500, 500, false); 
            await webcam.setup({ facingMode: "environment" }); 
            await webcam.play();
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            window.requestAnimationFrame(loop);
            updateDashboardStats();
        } catch(e) {
            console.error("Lỗi khởi tạo camera:", e);
        }
    }

    async function loop() {
        webcam.update();
        window.requestAnimationFrame(loop);
    }

    function showPage(pageId, btnEl) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        const targetPage = document.getElementById('page-' + pageId);
        if(targetPage) targetPage.classList.remove('hidden');
        if(btnEl) btnEl.classList.add('active');

        if(pageId === 'stats') renderChart();
        if(pageId === 'history') renderHistory();
        if(pageId === 'report') renderGeminiInsight();
    }

    async function capture() {
        if(!model) return;
        const prediction = await model.predict(webcam.canvas);
        let top = { p: 0, l: "" };
        prediction.forEach(p => { if(p.probability > top.p) top = { p: p.probability, l: p.className }; });

        const MAP = {
            "Giay": { n: "Giấy sạch", a: "Bỏ vào thùng xanh dành cho giấy tái chế.", c: "recycle" },
            "Nhua": { n: "Nhựa", a: "Rửa sạch, làm khô trước khi vứt vào thùng tái chế.", c: "recycle" },
            "Carton": { n: "Bìa Carton", a: "Gấp phẳng để tiết kiệm diện tích thu gom.", c: "recycle" },
            "Huu_Co": { n: "Hữu Cơ", a: "Có thể ủ làm phân bón tại nhà rất tốt.", c: "organic" }
        };

        if(top.l !== "Background" && top.p > 0.8) {
            const data = MAP[top.l];
            document.getElementById("res-name").innerText = data.n;
            document.getElementById("res-advice").innerText = data.a;
            document.getElementById("res-box").className = "card result-display " + (data.c === 'organic' ? 'organic' : '');
            
            stats[top.l]++;
            localStorage.setItem('eco_v8_stats', JSON.stringify(stats));
            
            let hist = JSON.parse(localStorage.getItem('eco_v8_hist') || '[]');
            hist.unshift({ n: data.n, t: new Date().toLocaleTimeString('vi-VN') });
            localStorage.setItem('eco_v8_hist', JSON.stringify(hist.slice(0, 10)));
            updateDashboardStats();
            
            if (navigator.vibrate) navigator.vibrate(50);
        }
    }

    function updateDashboardStats() {
        const total = Object.values(stats).reduce((a,b)=>a+b, 0);
        const totalEl = document.getElementById('count-total');
        if(totalEl) totalEl.innerText = total;
        if(total > 0) {
            const maxKey = Object.keys(stats).reduce((a, b) => stats[a] > stats[b] ? a : b);
            const MAP_NAMES = {"Giay":"Giấy", "Nhua":"Nhựa", "Carton":"Carton", "Huu_Co":"Hữu Cơ"};
            const topTypeEl = document.getElementById('top-type');
            if(topTypeEl) topTypeEl.innerText = MAP_NAMES[maxKey];
        }
    }

    function renderHistory() {
        const hist = JSON.parse(localStorage.getItem('eco_v8_hist') || '[]');
        const container = document.getElementById('history-container');
        if(!container) return;
        if(hist.length === 0) {
            container.innerHTML = "<p style='opacity:0.5; font-size:0.85rem;'>Chưa có lịch sử quét.</p>";
            return;
        }
        container.innerHTML = hist.map(h => `
            <div class="hist-item">
                <b>${h.n}</b> <span style="opacity:0.5">${h.t}</span>
            </div>
        `).join('');
    }

    function renderChart() {
        const canvas = document.getElementById('mainChart');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Giấy', 'Nhựa', 'Carton', 'Hữu cơ'],
                datasets: [{
                    data: [stats.Giay, stats.Nhua, stats.Carton, stats.Huu_Co],
                    backgroundColor: ['#97A970', '#718355', '#B08968', '#DDB892'],
                    borderWidth: 0
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
    }

    async function renderGeminiInsight() {
        const total = Object.values(stats).reduce((a,b)=>a+b, 0);
        const el = document.getElementById('gemini-insight');
        if(!el) return;
        
        if (total < 2) {
            el.innerText = "Hãy quét ít nhất 2 loại rác để tôi có đủ dữ liệu phân tích.";
            return;
        }

        el.innerText = "Gemini đang phân tích dữ liệu...";

        const prompt = `Tôi có số liệu rác: Giấy: ${stats.Giay}, Nhựa: ${stats.Nhua}, Carton: ${stats.Carton}, Hữu cơ: ${stats.Huu_Co}. Hãy đưa ra 1 lời khuyên ngắn gọn bằng tiếng Việt về bảo vệ môi trường (dưới 40 từ).`;

        try {
            const result = await aiModel.generateContent(prompt);
            const response = await result.response;
            el.innerHTML = "✨ <b>Lời khuyên từ AI:</b> " + response.text();
        } catch (e) {
            console.error("Gemini Error:", e);
            el.innerText = "Không thể kết nối với AI. Vui lòng thử lại sau.";
        }
    }

    async function askGemini() {
        const inputEl = document.getElementById('ai-input');
        const resEl = document.getElementById('ai-chat-res');
        if (!inputEl || !resEl || !inputEl.value) return;

        const userInput = inputEl.value;
        resEl.style.display = "block";
        resEl.innerText = "Đang suy nghĩ...";

        try {
            const result = await aiModel.generateContent(userInput + " (Trả lời ngắn gọn, thân thiện bằng tiếng Việt)");
            const response = await result.response;
            resEl.innerText = "🤖 " + response.text();
            inputEl.value = "";
        } catch (e) {
            console.error("Gemini Chat Error:", e);
            resEl.innerText = "Lỗi kết nối mạng. Vui lòng thử lại.";
        }
    }

    // Khởi chạy ứng dụng
    init();
</script>
</body>
</html>
